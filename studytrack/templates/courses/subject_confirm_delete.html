{% extends 'base.html' %}
{% block title %}Delete Subject{% endblock %}
{% block content %}
<h2>Delete "{{ subject.name }}"?</h2>
<p class="text-muted">All related exams and grades will also be deleted. This cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <a href="{% url 'courses:subject_detail' subject.pk %}" class="btn btn-outline-secondary me-2">Cancel</a>
    <button type="submit" class="btn btn-danger">Yes, delete it</button>
</form>
{% endblock %}
