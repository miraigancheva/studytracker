{% extends 'base.html' %}
{% block title %}Delete Grade{% endblock %}
{% block content %}
<h2>Delete this grade?</h2>
<p class="text-muted">{{ grade.subject.name }} &mdash; {{ grade.score }}/{{ grade.max_score }} on {{ grade.date }}</p>
<form method="post">
    {% csrf_token %}
    <a href="{% url 'grades:grade_detail' grade.pk %}" class="btn btn-outline-secondary me-2">Cancel</a>
    <button type="submit" class="btn btn-danger">Delete</button>
</form>
{% endblock %}
