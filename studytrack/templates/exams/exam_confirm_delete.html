{% extends 'base.html' %}
{% block title %}Delete Exam{% endblock %}
{% block content %}
<h2>Delete this exam?</h2>
<p class="text-muted">{{ exam.subject.name }} &mdash; {{ exam.date }}</p>
<form method="post">
    {% csrf_token %}
    <a href="{% url 'exams:exam_detail' exam.pk %}" class="btn btn-outline-secondary me-2">Cancel</a>
    <button type="submit" class="btn btn-danger">Delete</button>
</form>
{% endblock %}
