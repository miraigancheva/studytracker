<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StudyTrack{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'courses:home' %}">📚 StudyTrack</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'courses:subject_list' %}">Subjects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'exams:exam_list' %}">Exams</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'grades:grade_list' %}">Grades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'courses:group_list' %}">Study Groups</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-success alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<footer class="mt-5 py-3 bg-dark text-center">
    <div class="container">
        <p class="text-muted mb-1 small">StudyTrack — keep track of your uni performance</p>
        <div class="small">
            <a href="{% url 'courses:subject_list' %}" class="text-secondary me-2">Subjects</a>
            <a href="{% url 'exams:exam_list' %}" class="text-secondary me-2">Exams</a>
            <a href="{% url 'grades:grade_list' %}" class="text-secondary me-2">Grades</a>
            <a href="{% url 'courses:group_list' %}" class="text-secondary">Groups</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
